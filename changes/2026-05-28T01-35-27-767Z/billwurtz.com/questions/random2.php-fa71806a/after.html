            <script type="text/javascript">
    function submit_question() {
        document.forms["ask"].submit(); 
        document.forms["ask"].reset(); 
    }
        
    function on_press(e) {
        var code = (e.keyCode ? e.keyCode : e.which);
        
        // if its a mobile device it will have a "orientation" field, so check for that 
         if (!(typeof window.orientation !== "undefined") || (navigator.userAgent.indexOf('IEMobile') !== -1)) {
            // if user presses enter and is not holding down shift, submit question
            if (code == 13 && !e.shiftKey) { 
        
                submit_question(); 
                e.preventDefault();

            }
         }
    }
    </script>
