            <script type="text/javascript">
   // after this many characters, enter will go back to working normally.
    var CHARACTERS_TO_DISALLOW_ENTER = 50;
          
    var question_submitted_already = false;     
    function submit_question() {
        if (question_submitted_already == false) 
        {
            question_submitted_already = true;
            document.forms["ask"].submit(); 
            document.forms["ask"].reset(); 
        }
    }
        

        
    function on_press(e) {
        var code = (e.keyCode ? e.keyCode : e.which);
        
        // if its a mobile device it will have a "orientation" field, so check for that 
         if (!(typeof window.orientation !== "undefined") || (navigator.userAgent.indexOf('IEMobile') !== -1)) {
            // if user presses enter and is not holding down shift, submit question
            if (code == 13 && !e.shiftKey) { 
        
                submit_question(); 
                e.preventDefault();

            }
         }
    }
// reset the page when the back/foward cache is active. 
// allows questions to be submitted after back is pressed on 
// some browsers *ahem*safari
window.onpageshow = function(event) {
  if (event.persisted) {
    window.location.reload() 
  }
};
    </script>
